<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ya no estes molesta</title>
<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}
canvas {
    display: block;
}
</style>
</head>

<body>

<!-- 🎵 MUSICA AUTOMATICA -->
<audio id="bg-music" loop>
    <source src="Lovers Rock.mp3" type="audio/mpeg">
</audio>

<canvas id="matrix"></canvas>

<script>

window.addEventListener("load", function() {
    const audio = document.getElementById("bg-music");
    audio.volume = 0.8;

    audio.play().catch(() => {
        document.addEventListener("click", () => {
            audio.play();
        }, { once: true });
    });
});

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const fontSize = 25;
const cols = 10;
const spacing = canvas.width / cols;
const drops = Array.from({ length: cols }, () => Math.random() * canvas.height / fontSize);
let heartbeat = 0;
let hearts = [];

// 🖼 Cargar imagen desde la misma carpeta
const imagen = new Image();
imagen.src = "miau.jpg"; // ← CAMBIA ESTE NOMBRE POR TU IMAGEN

function draw() {
ctx.fillStyle = "rgba(0, 0, 0, 0.03)";
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.fillStyle = "#ff69b4";
ctx.font = fontSize + "px monospace";
ctx.textAlign = "left";

for (let i = 0; i < cols; i++) {
    const x = i * spacing + spacing / 40;
    const y = drops[i] * fontSize;

    for (let j = 0; j < 30; j++) {
        const yy = y - j * fontSize;
        if (yy > 0 && yy < canvas.height) {
            ctx.fillText("te quelo musho", x, yy);
        }
    }

    drops[i] += 1;

    if (y > canvas.height + fontSize * 30) {
        drops[i] = 0;
    }
}

// 💖 Texto central
heartbeat += 0.1;
let scale = 1 + 0.05 * Math.sin(heartbeat);

ctx.save();
ctx.textAlign = "center";
ctx.textBaseline = "middle";

ctx.font = "28px monospace";
ctx.fillStyle = "white";
ctx.fillText("dale tikitki vaneeee te amo muchoooooooooooooooooooooooooooo",
             canvas.width / 2,
             canvas.height / 2 - 80);

ctx.font = `${60 * scale}px monospace`;
ctx.fillStyle = "white";
ctx.fillText("ya no estes asi va ?",
             canvas.width / 2,
             canvas.height / 2);

ctx.restore();

// 🖼 Dibujar imagen debajo del texto (tamaño mediano)
if (imagen.complete) {
    const imgWidth = 250;  // tamaño mediano
    const imgHeight = 250;
    ctx.drawImage(
        imagen,
        canvas.width / 2 - imgWidth / 2,
        canvas.height / 2 + 100,
        imgWidth,
        imgHeight
    );
}

// 💕 Corazones
hearts.forEach((heart, i) => {
    ctx.save();
    ctx.globalAlpha = 1 - heart.life / 30;
    ctx.font = "160px serif";
    ctx.fillStyle = "#ff69b4";
    ctx.shadowColor = "#ff1493";
    ctx.shadowBlur = 10;
    ctx.textAlign = "center";
    ctx.fillText("❤", heart.x, heart.y);
    ctx.restore();

    heart.x += heart.vx;
    heart.y += heart.vy;
    heart.life++;

    if (heart.life > 30) hearts.splice(i, 1);
});
}

canvas.addEventListener("click", e => {
hearts.push({
    x: e.clientX,
    y: e.clientY,
    vx: (Math.random() - 0.5) * 4,
    vy: (Math.random() - 0.5) * 4,
    life: 0
});
});

setInterval(draw, 50);

window.addEventListener("resize", () => {
canvas.width = innerWidth;
canvas.height = innerHeight;
});

</script>

</body>
</html>
